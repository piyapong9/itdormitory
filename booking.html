    <section class="booking-section">
        <h1 class="heading">จอง <span>ห้องพัก</span></h1>

        <div class="booking-container">
            <div class="booking-form-card">
                <h2><i class="fa-solid fa-pen-to-square"></i> กรอกข้อมูลการจอง</h2>

                <div class="form-group">
                    <label>รหัสนักศึกษา <span class="required">*</span></label>
                    <input type="text" placeholder="กรอกรหัสนักศึกษา">
                </div>
                <div class="form-group">
                    <label>ชื่อ-นามสกุล <span class="required">*</span></label>
                    <input type="text" placeholder="กรอกชื่อ-นามสกุล">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>อีเมล <span class="required">*</span></label>
                        <input type="email" placeholder="กรอกอีเมล">
                    </div>
                    <div class="form-group">
                        <label>เบอร์โทรศัพท์ <span class="required">*</span></label>
                        <input type="tel" placeholder="กรอกเบอร์โทร" maxlength="10">
                    </div>
                </div>
                <div class="form-group">
                    <label>คณะ <span class="required">*</span></label>
                    <select>
                        <option value="">-- เลือกคณะ --</option>
                        <option value="คณะเกษตร">คณะเกษตร</option>
                        <option value="คณะวิศวกรรมศาสตร์">คณะวิศวกรรมศาสตร์</option>
                        <option value="คณะวิทยาศาสตร์การกีฬาและสุขภาพ">คณะวิทยาศาสตร์การกีฬาและสุขภาพ</option>
                        <option value="คณะศิลปศาสตร์และวิทยาศาสตร์">คณะศิลปศาสตร์และวิทยาศาสตร์</option>
                        <option value="คณะศึกษาศาสตร์และพัฒนศาสตร์">คณะศึกษาศาสตร์และพัฒนศาสตร์</option>
                        <option value="คณะอุตสาหกรรมบริการ">คณะอุตสาหกรรมบริการ</option>
                        <option value="คณะสัตวแพทยศาสตร์">คณะสัตวแพทยศาสตร์</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>เพศ <span class="required">*</span></label>
                        <select id="genderSelect" onchange="updateDormOptions()">
                            <option value="">-- เลือกเพศ --</option>
                            <option value="male">ชาย</option>
                            <option value="female">หญิง</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ประเภทหอ <span class="required">*</span></label>
                        <select id="typeSelect" onchange="updateDormOptions()">
                            <option value="">-- เลือกประเภท --</option>
                            <option value="fan">พัดลม (฿2,000/เทอม)</option>
                            <option value="air">แอร์ (฿2,000/เดือน)</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>หอพัก <span class="required">*</span></label>
                        <select id="dormSelect" onchange="updateRoomOptions()">
                            <option value="">-- เลือกหอพัก --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ห้อง <span class="required">*</span></label>
                        <select id="roomSelect">
                            <option value="">-- เลือกห้อง --</option>
                        </select>
                    </div>
                </div>

                <button class="btn-booking" onclick="goToPayment()">
                    <i class="fa-solid fa-calendar-check"></i> จองเลย
                </button>
            </div>
        </div>
    </section>
