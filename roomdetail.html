<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดห้องพัก - IT Dormitory</title>
    <link rel="stylesheet" href="css/roomdetail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="header">
        <div class="container">
            <div class="logo">
                <a href="homepage.html"><i class="fa-solid fa-home"></i></a>
            </div>
            <nav>
                <ul class="sidebar">
                    <li onclick="hideSidebar()"><a href="#"><i class="fa-solid fa-xmark"></i></a></li>
                    <li><a href="homepage.html">หน้าแรก</a></li>
                    <li><a href="searchroom.html">ค้นหาห้องพัก</a></li>
                    <li><a href="profile.html">โปรไฟล์</a></li>
                </ul>
                <ul>
                    <li><a class="mobile" href="homepage.html">หน้าแรก</a></li>
                    <li><a class="mobile" href="searchroom.html">ค้นหาห้องพัก</a></li>
                    <li><a class="mobile" href="profile.html">โปรไฟล์</a></li>
                    <li class="menu-button" onclick="showSidebar()"><a href="#"><i class="fa-solid fa-bars"></i></a></li>
                </ul>
            </nav>
        </div>
    </div>

    <section class="room-detail-section">
        <h1 class="heading">รายละเอียด <span>ห้องพัก</span></h1>

        <div class="room-detail-container">
            <div class="room-gallery">
                <div class="main-image">
                    <img id="mainImg" src="https://images.unsplash.com/photo-1555854877-bab0e564b8d5?w=800&h=500&fit=crop" alt="ห้องพัก">
                </div>
            </div>

            <div class="room-info-detail">
                <h2 id="roomName">หอพักชายตึก 1</h2>
                <span class="status-badge available" id="statusBadge">ว่าง 2/4</span>

                <div class="info-group">
                    <h3>ข้อมูลห้อง</h3>
                    <div class="info-row">
                        <span>เลขห้อง:</span>
                        <span id="roomNumber">101</span>
                    </div>
                    <div class="info-row">
                        <span>ประเภทหอ:</span>
                        <span id="dormType">พัดลม</span>
                    </div>
                    <div class="info-row">
                        <span>ราคา:</span>
                        <span id="dormPrice">฿2,000/เทอม</span>
                    </div>
                </div>

                <a href="payment.html" id="btnBooking" class="btn-booking">
                    <i class="fa-solid fa-calendar-check"></i> จองห้องพักนี้
                </a>
                <a href="searchroom.html" class="btn-back">
                    <i class="fa-solid fa-arrow-left"></i> กลับไปค้นหาห้อง
                </a>
            </div>
        </div>
    </section>

    <section class="contact" id="social-icons">
        <h1 class="heading"><span>ติดต่อ</span> เจ้าหน้าที่</h1>
        <div class="social-icons">
            <a href="https://www.facebook.com/piyapong.piyapong.3939"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/pleum700?igsh=Nnp6YnV3MGRsZ3ho&utm_source=qr"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@piyapongpp?_t=ZS-8vCUmgTFCmW&_r=1"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://github.com/piyapong9?tab=repositories"><i class="fa-brands fa-github"></i></a>
        </div>
    </section>

    <script>
        function showSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.style.display = 'flex';
        }
        function hideSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.style.display = 'none';
        }

        // อ่านค่าจาก URL params
        const params = new URLSearchParams(window.location.search);
        const dormNum = parseInt(params.get('dorm')) || 1;
        const roomNum = parseInt(params.get('room')) || 1;

        // กำหนดข้อมูลตาม dormNum
        let dormNameText, dormType, capacity, price;
        if (dormNum >= 1 && dormNum <= 5) {
            dormNameText = 'หอพักชายตึก ' + dormNum;
            dormType = 'พัดลม';
            capacity = 4;
            price = '฿2,000/เทอม';
        } else if (dormNum >= 6 && dormNum <= 10) {
            dormNameText = 'หอพักชายตึก ' + dormNum;
            dormType = 'แอร์';
            capacity = dormNum <= 8 ? 3 : 2;
            price = '฿2,000/เดือน';
        } else if (dormNum >= 11 && dormNum <= 15) {
            dormNameText = 'หอพักหญิงตึก ' + dormNum;
            dormType = 'พัดลม';
            capacity = 4;
            price = '฿2,000/เทอม';
        } else {
            dormNameText = 'หอพักหญิงตึก ' + dormNum;
            dormType = 'แอร์';
            capacity = dormNum <= 18 ? 3 : 2;
            price = '฿2,000/เดือน';
        }

        const roomCode = dormNum + String(roomNum).padStart(2, '0');

        // seeded random ตรงกับทั้งระบบ
        const seed = dormNum * 100 + roomNum;
        const hash = Math.sin(seed) * 10000;
        const rand = hash - Math.floor(hash);
        const occupied = Math.floor(rand * (capacity + 1));
        const vacant = capacity - occupied;
        const isAvailable = vacant > 0;
        const vacancy = occupied + '/' + capacity;

        document.getElementById('roomName').textContent = dormNameText;
        document.getElementById('roomNumber').textContent = roomCode;
        document.getElementById('dormType').textContent = dormType;
        document.getElementById('dormPrice').textContent = price;
        document.title = 'ห้อง ' + roomCode + ' - ' + dormNameText;
        document.getElementById('btnBooking').href = 'payment.html?dorm=' + dormNum + '&room=' + roomNum;

        // เปลี่ยนรูปตามประเภทหอ
        if (dormType === 'แอร์') {
            document.getElementById('mainImg').src = 'https://dorm.kku.ac.th/wp-content/uploads/2023/04/110776.jpg';
        } else {
            document.getElementById('mainImg').src = 'https://dorm.op.swu.ac.th/Portals/22/BlockBuilderImages/10817/12.jpg';
        }

        // อัปเดต status badge
        const badge = document.getElementById('statusBadge');
        if (isAvailable) {
            badge.textContent = 'ว่าง ' + vacancy;
            badge.className = 'status-badge available';
        } else {
            badge.textContent = 'เต็ม ' + capacity + '/' + capacity;
            badge.className = 'status-badge unavailable';
            document.getElementById('btnBooking').style.display = 'none';
        }
    </script>
    <script src="js/roomdetail.js"></script>
</body>
</html>
